*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;--bg2:#ffffff;--bg3:#f1f3f5;

body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.h-info{margin-left:12px}
.h-title{font-size:15px;font-weight:600}
.h-sub{font-size:11px;color:var(--muted)}
.tab-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:4px;overflow-x:auto}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;font-family:'Sarabun',sans-serif;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.page{display:none;padding:22px 28px}
.page.active{display:block}
.slabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.slabel::after{content:'';flex:1;height:1px;background:var(--border)}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px 17px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:var(--c,var(--blue))}
.kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:500}
.kpi-val{font-size:21px;font-weight:700;margin:5px 0 3px}
.kpi-sub{font-size:11px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-top:5px}
.b-g{background:rgba(16,185,129,.15);color:var(--green)}
.b-a{background:rgba(245,158,11,.15);color:var(--amber)}
.b-r{background:rgba(239,68,68,.15);color:var(--red)}
.b-p{background:rgba(139,92,246,.15);color:var(--purple)}
.b-t{background:rgba(20,184,166,.15);color:var(--teal)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.ctag{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(59,130,246,.15);color:var(--blue);white-space:nowrap}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 11px;text-align:left;border-bottom:1px solid var(--border);font-weight:500}
td{padding:9px 11px;font-size:12px;border-bottom:1px solid rgba(0,0,0,0.06);vertical-align:middle}
tr:hover td{background:rgba(0,0,0,0.03)}
.bw{display:flex;align-items:center;gap:7px}
.bt{flex:1;height:5px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.pill{padding:2px 9px;border-radius:10px;font-size:10px;font-weight:600}
.p-g{background:rgba(16,185,129,.15);color:var(--green)}
.p-a{background:rgba(245,158,11,.15);color:var(--amber)}
.p-r{background:rgba(239,68,68,.15);color:var(--red)}
.p-p{background:rgba(139,92,246,.15);color:var(--purple)}
.ins-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.ins-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--c,var(--blue));border-radius:12px;padding:14px 15px}
.ins-icon{font-size:16px;margin-bottom:6px}
.ins-title{font-size:12px;font-weight:600;margin-bottom:3px}
.ins-body{font-size:11px;color:var(--muted);line-height:1.6}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}.g2,.g3{grid-template-columns:1fr}.ins-grid{grid-template-columns:1fr 1fr}}
</style>

const chartInstances = {};
function renderMonth(mi) {

  const pcts = actProd.map((a,i) => Math.round(a/CAP_PROD[i]*100));
  const utilColors = pcts.map(p => p>=80?'#10b981':p>=40?'#f59e0b':'#ef4444');

  const plantAct = PLANT_ACT[mi];

  if (!chartInstances[`c1-${mi}`]) {
    chartInstances[`c1-${mi}`] = new Chart(document.getElementById(`c1-${mi}`),{
      type:'bar',
      data:{labels:PRODS,datasets:[
        {label:'กำลังผลิตเต็มที่',data:CAP_PROD,backgroundColor:'rgba(0,0,0,0.06)',borderColor:'rgba(0,0,0,0.15)',borderWidth:1,borderRadius:4},
        {label:'ผลิตจริง',data:actProd,backgroundColor:PROD_COLORS.map(c=>c+'aa'),borderColor:PROD_COLORS,borderWidth:1.5,borderRadius:4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},tooltip:tip},
        scales:{x:{grid:{color:gc},ticks:{color:tc,callback:v=>v.toLocaleString()}},y:{grid:{display:false},ticks:{color:tc,font:{size:11}}}}
      }
    });
  }

  if (!chartInstances[`c2-${mi}`]) {
    chartInstances[`c2-${mi}`] = new Chart(document.getElementById(`c2-${mi}`),{
      type:'bar',
      data:{labels:PRODS,datasets:[{label:'% Utilization',data:pcts,
        backgroundColor:utilColors.map(c=>c+'aa'),borderColor:utilColors,borderWidth:1.5,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:false},tooltip:{...tip,callbacks:{label:ctx=>` ${ctx.parsed.x}%`}}},
        scales:{x:{grid:{color:gc},ticks:{color:tc,callback:v=>v+'%'},max:130,min:0},y:{grid:{display:false},ticks:{color:tc,font:{size:11}}}}
      }
    });
  }

  if (!chartInstances[`c3-${mi}`]) {
    chartInstances[`c3-${mi}`] = new Chart(document.getElementById(`c3-${mi}`),{
      type:'doughnut',
      data:{labels:['พัทยา','นาวัง','หนองปรือ','ปทุมธานี'],
        datasets:[{data:plantAct,backgroundColor:PLANT_COLORS,borderColor:'#ffffff',borderWidth:3,hoverOffset:8}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
        plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11},padding:8}},tooltip:tip}}
    });
  }

  if (!chartInstances[`c4-${mi}`]) {
    chartInstances[`c4-${mi}`] = new Chart(document.getElementById(`c4-${mi}`),{
      type:'bar',
      data:{labels:d.days.map(String),datasets:[
        {label:'P1',data:d.p1,backgroundColor:'#3b82f6bb',borderRadius:2,stack:'s'},
        {label:'P2',data:d.p2,backgroundColor:'#8b5cf6bb',borderRadius:2,stack:'s'}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},tooltip:tip},
        scales:{x:{stacked:true,grid:{color:gc},ticks:{color:tc,font:{size:10}}},y:{stacked:true,grid:{color:gc},ticks:{color:tc}}}
      }
    });
  }

  if (!chartInstances[`c6-${mi}`]) {
    const gaps = CAP_PROD.map((c,i) => Math.max(0, c - actProd[i]));
    chartInstances[`c6-${mi}`] = new Chart(document.getElementById(`c6-${mi}`),{
      type:'bar',
      data:{labels:PRODS,datasets:[
        {label:'ผลิตจริง',data:actProd,backgroundColor:PROD_COLORS.map(c=>c+'99'),borderColor:PROD_COLORS,borderWidth:1,borderRadius:3,stack:'s'},
        {label:'Capacity เหลือ',data:gaps,backgroundColor:'rgba(0,0,0,0.04)',borderColor:'rgba(0,0,0,0.12)',borderWidth:1,borderRadius:3,stack:'s'}
      ]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},tooltip:{...tip,callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.x.toLocaleString()} คิว`}}},
        scales:{x:{stacked:true,grid:{color:gc},ticks:{color:tc,callback:v=>v.toLocaleString()}},y:{stacked:true,grid:{display:false},ticks:{color:tc,font:{size:11}}}}
      }
    });
  }

  if (!chartInstances[`c7-${mi}`]) {
    const plantNames = ['พัทยา','นาวัง','หนองปรือ','ปทุมธานี'];
    const plantPcts = PLANT_ACT[mi].map((a,i)=>Math.round(a/PLANT_CAP[i]*100));
    const pColors = plantPcts.map(p=>p>=60?'#10b981':p>=35?'#f59e0b':'#ef4444');
    chartInstances[`c7-${mi}`] = new Chart(document.getElementById(`c7-${mi}`),{
      type:'bar',
      data:{labels:plantNames,datasets:[{label:'% Utilization',data:plantPcts,backgroundColor:pColors.map(c=>c+'bb'),borderColor:pColors,borderWidth:1.5,borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{...tip,callbacks:{label:ctx=>`Util: ${ctx.parsed.y}%`,afterLabel:ctx=>`ผลิตจริง: ${PLANT_ACT[mi][ctx.dataIndex].toLocaleString()} คิว`}}},
        scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:12}}},y:{grid:{color:gc},ticks:{color:tc,callback:v=>v+'%'},min:0,max:100}},
        layout:{padding:{top:20}}
      },
      plugins:[{id:'pctLabel',afterDatasetsDraw(chart){
        const {ctx,data}=chart;
        data.datasets[0].data.forEach((val,i)=>{
          const bar=chart.getDatasetMeta(0).data[i];
          ctx.save();ctx.fillStyle=val>=60?'#10b981':val>=35?'#f59e0b':'#ef4444';
          ctx.font='bold 13px Sarabun';ctx.textAlign='center';
          ctx.fillText(val+'%',bar.x,bar.y-6);ctx.restore();
        });
      }}]
    });
  }

  if (!chartInstances[`c8-${mi}`]) {
    const prodColors6=['#3b82f6','#f97316','#a855f7','#10b981','#ef4444','#eab308','#06b6d4'];
    const dashPatterns=[[],[6,3],[3,3],[8,4],[4,4,1,4],[],[2,2]];
    const datasets=PRODS.map((p,pi)=>({
      label:p,data:ACT_PROD.map((mo)=>parseFloat((mo[pi]/CAP_PROD[pi]*100).toFixed(1))),
      borderColor:prodColors6[pi],backgroundColor:prodColors6[pi]+'15',borderWidth:2,
      pointRadius:4,pointBackgroundColor:prodColors6[pi],pointBorderColor:'#ffffff',pointBorderWidth:1.5,
      tension:0.35,fill:false,borderDash:dashPatterns[pi]
    }));
    chartInstances[`c8-${mi}`] = new Chart(document.getElementById(`c8-${mi}`),{
      type:'line',data:{labels:MONTHS,datasets},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10},padding:8,usePointStyle:true}},tooltip:{...tip,callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y}%`}}},
        scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,callback:v=>v+'%'},min:0}}
      }
    });
  }

  if (!chartInstances[`c9-${mi}`]) {
    let deltas;
    if (mi===0) { deltas=actProd.map(()=>0); }
    else { const prev=ACT_PROD[mi-1]; deltas=actProd.map((a,i)=>Math.round((a-prev[i])*10)/10); }
    const dColors=deltas.map(d=>d>=0?'#10b981aa':'#ef4444aa');
    const dBorders=deltas.map(d=>d>=0?'#10b981':'#ef4444');
    chartInstances[`c9-${mi}`] = new Chart(document.getElementById(`c9-${mi}`),{
      type:'bar',
      data:{labels:PRODS,datasets:[{label:'เปลี่ยนแปลง (คิว)',data:deltas,backgroundColor:dColors,borderColor:dBorders,borderWidth:1.5,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:false},tooltip:{...tip,callbacks:{label:ctx=>{const v=ctx.parsed.x;return ` ${v>=0?'+':''}${v.toLocaleString()} คิว`}}}},
        scales:{x:{grid:{color:gc},ticks:{color:tc,callback:v=>(v>=0?'+':'')+v.toLocaleString()},afterDataLimits:a=>{const mx=Math.max(...deltas.map(Math.abs));a.min=-mx*1.2;a.max=mx*1.2;}},y:{grid:{display:false},ticks:{color:tc,font:{size:11}}}}
      }
    });
  }

  const tb=document.getElementById(`tb-${mi}`);
  if (tb && !tb.innerHTML) {
    tb.innerHTML=TABLE_ROWS[mi].map(([label,cap,act,note])=>{
      const pct=Math.round(act/cap*100);
      const col=pct>=80?'#10b981':pct>=50?'#3b82f6':pct>=30?'#f59e0b':'#ef4444';
      const status=pct>=80?'ดีมาก':pct>=50?'ดี':pct>=30?'ปานกลาง':'ต่ำ';
      const pillC=pct>=80?'p-g':pct>=50?'p-g':pct>=30?'p-a':'p-r';
      return `<tr>
        <td style="font-weight:500">${label}</td><td>${cap.toLocaleString()}</td>
        <td><strong>${act.toLocaleString()}</strong></td>
        <td><div class="bw"><div class="bt"><div class="bf" style="width:${Math.min(pct,100)}%;background:${col}"></div></div>
          <span style="min-width:36px;color:${col};font-weight:600;font-size:11px">${pct}%</span></div></td>
        <td><span class="pill ${pillC}">${status}</span></td>
        <td style="color:var(--muted);font-size:11px">${note}</td>
      </tr>`;
    }).join('');
  }

  const insEl=document.getElementById(`ins-${mi}`);
  if (insEl && !insEl.innerHTML) {
    insEl.innerHTML=INSIGHTS[mi].map(ins=>`
      <div class="ins-card" style="--c:${ins.c}">
        <div class="ins-icon">${ins.icon}</div>
        <div class="ins-title">${ins.title}</div>
        <div class="ins-body">${ins.body}</div>
      </div>`).join('');
  }
}

function renderAll() {
  if (chartInstances['ca1']) return;
  const cumProd = PRODS.map((_,pi)=>Math.round(ACT_PROD.reduce((s,mo)=>s+mo[pi],0)*100)/100);
  const cumPlant = [0,1,2,3].map(pi=>Math.round(PLANT_ACT.reduce((s,mo)=>s+mo[pi],0)*100)/100);
  const cumProdPcts = cumProd.map((v,i)=>Math.round(v/CAP_PROD[i]/NM*100));
  const utilColors = cumProdPcts.map(p=>p>=80?'#10b981':p>=40?'#f59e0b':'#ef4444');
  const plantUtil6 = cumPlant.map((v,i)=>parseFloat((v/PLANT_CAP[i]/NM*100).toFixed(1)));
  const pColors4 = plantUtil6.map(p=>p>=60?'#10b981':p>=35?'#f59e0b':'#ef4444');
  const plantNames = ['พัทยา','นาวัง','หนองปรือ','ปทุมธานี'];
  const prodColors6=['#3b82f6','#f97316','#a855f7','#10b981','#ef4444','#eab308','#06b6d4'];
  const dashPatterns=[[],[6,3],[3,3],[8,4],[4,4,1,4],[],[2,2]];

  // ca1: ผลผลิตแต่ละสินค้า vs กำลังผลิตเต็มที่ (6 เดือน)
  chartInstances['ca1'] = new Chart(document.getElementById('ca1'),{
    type:'bar',
    data:{labels:PRODS,datasets:[
      {label:`กำลังผลิตเต็มที่ (${NM} เดือน)`,data:CAP_PROD.map(c=>c*NM),backgroundColor:'rgba(0,0,0,0.06)',borderColor:'rgba(0,0,0,0.15)',borderWidth:1,borderRadius:4},
      {label:'ผลิตจริงรวม',data:cumProd,backgroundColor:PROD_COLORS.map(c=>c+'aa'),borderColor:PROD_COLORS,borderWidth:1.5,borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},tooltip:tip},
      scales:{x:{grid:{color:gc},ticks:{color:tc,callback:v=>v.toLocaleString()}},y:{grid:{display:false},ticks:{color:tc,font:{size:11}}}}
    }
  });

  // ca2: % Utilization เฉลี่ยแต่ละสินค้า
  chartInstances['ca2'] = new Chart(document.getElementById('ca2'),{
    type:'bar',
    data:{labels:PRODS,datasets:[{label:'% Utilization เฉลี่ย',data:cumProdPcts,
      backgroundColor:utilColors.map(c=>c+'aa'),borderColor:utilColors,borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{display:false},tooltip:{...tip,callbacks:{label:ctx=>` ${ctx.parsed.x}%`}}},
      scales:{x:{grid:{color:gc},ticks:{color:tc,callback:v=>v+'%'},max:130,min:0},y:{grid:{display:false},ticks:{color:tc,font:{size:11}}}}
    }
  });

  // ca3: donut สัดส่วนโรงงาน
  chartInstances['ca3'] = new Chart(document.getElementById('ca3'),{
    type:'doughnut',
    data:{labels:plantNames,datasets:[{data:cumPlant,backgroundColor:PLANT_COLORS,borderColor:'#ffffff',borderWidth:3,hoverOffset:8}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11},padding:8}},tooltip:tip}}
  });

  // ca4: ผลผลิตรายเดือน โรงงานพัทยา P1+P2
  const monthP1 = DAILY.map(d=>Math.round(d.p1.reduce((a,b)=>a+b,0)*100)/100);
  const monthP2 = DAILY.map(d=>Math.round(d.p2.reduce((a,b)=>a+b,0)*100)/100);
  chartInstances['ca4'] = new Chart(document.getElementById('ca4'),{
    type:'bar',
    data:{labels:MONTHS,datasets:[
      {label:'P1',data:monthP1,backgroundColor:'#3b82f6bb',borderRadius:2,stack:'s'},
      {label:'P2',data:monthP2,backgroundColor:'#8b5cf6bb',borderRadius:2,stack:'s'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},tooltip:{...tip,callbacks:{footer:items=>`รวม: ${items.reduce((s,i)=>s+i.parsed.y,0).toLocaleString()} คิว`}}},
      scales:{x:{stacked:true,grid:{color:gc},ticks:{color:tc,font:{size:10}}},y:{stacked:true,grid:{color:gc},ticks:{color:tc,callback:v=>v.toLocaleString()}}}
    }
  });

  // ca6: Gap Analysis
  chartInstances['ca6'] = new Chart(document.getElementById('ca6'),{
    type:'bar',
    data:{labels:PRODS,datasets:[
      {label:'ผลิตจริงรวม',data:cumProd,backgroundColor:PROD_COLORS.map(c=>c+'99'),borderColor:PROD_COLORS,borderWidth:1,borderRadius:3,stack:'s'},
      {label:'Capacity เหลือ',data:CAP_PROD.map((c,i)=>Math.max(0,c*NM-cumProd[i])),backgroundColor:'rgba(0,0,0,0.04)',borderColor:'rgba(0,0,0,0.12)',borderWidth:1,borderRadius:3,stack:'s'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}},tooltip:{...tip,callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.x.toLocaleString()} คิว`}}},
      scales:{x:{stacked:true,grid:{color:gc},ticks:{color:tc,callback:v=>v.toLocaleString()}},y:{stacked:true,grid:{display:false},ticks:{color:tc,font:{size:11}}}}
    }
  });

  // ca7: เปรียบเทียบ Utilization 4 โรงงาน
  chartInstances['ca7'] = new Chart(document.getElementById('ca7'),{
    type:'bar',
    data:{labels:plantNames,datasets:[{label:'% Utilization เฉลี่ย',data:plantUtil6,backgroundColor:pColors4.map(c=>c+'bb'),borderColor:pColors4,borderWidth:1.5,borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...tip,callbacks:{label:ctx=>`Util: ${ctx.parsed.y}%`,afterLabel:ctx=>`ผลิตจริงรวม: ${cumPlant[ctx.dataIndex].toLocaleString()} คิว`}}},
      scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:12}}},y:{grid:{color:gc},ticks:{color:tc,callback:v=>v+'%'},min:0,max:100}},
      layout:{padding:{top:20}}
    },
    plugins:[{id:'pctLabelAll',afterDatasetsDraw(chart){
      const {ctx,data}=chart;
      data.datasets[0].data.forEach((val,i)=>{
        const bar=chart.getDatasetMeta(0).data[i];
        ctx.save();ctx.fillStyle=val>=60?'#10b981':val>=35?'#f59e0b':'#ef4444';
        ctx.font='bold 13px Sarabun';ctx.textAlign='center';
        ctx.fillText(val+'%',bar.x,bar.y-6);ctx.restore();
      });
    }}]
  });

  // ca8: Trend Utilization แต่ละสินค้า
  chartInstances['ca8'] = new Chart(document.getElementById('ca8'),{
    type:'line',
    data:{labels:MONTHS,datasets:PRODS.map((p,pi)=>({
      label:p,data:ACT_PROD.map((mo)=>parseFloat((mo[pi]/CAP_PROD[pi]*100).toFixed(1))),
      borderColor:prodColors6[pi],backgroundColor:prodColors6[pi]+'15',borderWidth:2,
      pointRadius:4,pointBackgroundColor:prodColors6[pi],pointBorderColor:'#ffffff',pointBorderWidth:1.5,
      tension:0.35,fill:false,borderDash:dashPatterns[pi]
    }))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10},padding:8,usePointStyle:true}},tooltip:{...tip,callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y}%`}}},
      scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,callback:v=>v+'%'},min:0}}
    }
  });

  // ca9: Trend ผลผลิตรวมรายเดือน
  chartInstances['ca9'] = new Chart(document.getElementById('ca9'),{
    type:'bar',
    data:{labels:MONTHS,datasets:[{label:'ผลิตจริงรวม (คิว)',data:TOTAL_ACT,
      backgroundColor:TOTAL_ACT.map((_,i)=>i===0?'#3b82f6bb':TOTAL_ACT[i]>=TOTAL_ACT[i-1]?'#10b981bb':'#ef4444bb'),
      borderColor:TOTAL_ACT.map((_,i)=>i===0?'#3b82f6':TOTAL_ACT[i]>=TOTAL_ACT[i-1]?'#10b981':'#ef4444'),
      borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...tip,callbacks:{label:ctx=>{
        const v=ctx.parsed.y;const i=ctx.dataIndex;
        const chg=i===0?'':(v-TOTAL_ACT[i-1]>=0?` ▲ +${(v-TOTAL_ACT[i-1]).toLocaleString()}`:`▼ ${(v-TOTAL_ACT[i-1]).toLocaleString()}`);
        return `${v.toLocaleString()} คิว${chg}`;
      }}}},
      scales:{x:{grid:{display:false},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc,callback:v=>v.toLocaleString()},min:0}}
    }
  });

  // ca10: Trend คิวคอนกรีตผลิตภัณฑ์สำเร็จรูป (ปริมาณจริง ไม่ใช่ %)
  chartInstances['ca10'] = new Chart(document.getElementById('ca10'),{
    type:'line',
    data:{labels:MONTHS,datasets:PRODS.map((p,pi)=>({
      label:p,data:ACT_PROD.map(mo=>mo[pi]),
      borderColor:prodColors6[pi],backgroundColor:prodColors6[pi]+'15',borderWidth:2,
      pointRadius:4,pointBackgroundColor:prodColors6[pi],pointBorderColor:'#ffffff',pointBorderWidth:1.5,
      tension:0.35,fill:false,borderDash:dashPatterns[pi]
    }))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10},padding:8,usePointStyle:true}},tooltip:{...tip,callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} คิว`}}},
      scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,callback:v=>v.toLocaleString()},min:0}}
    }
  });

  // fill table (10 lines)
  const tb = document.getElementById('tb-all');
  if (tb && !tb.innerHTML) {
    tb.innerHTML = TABLE_ROWS[0].map((row, ri) => {
      const label = row[0];
      const capN = row[1] * NM;
      const act = Math.round(TABLE_ROWS.reduce((s,mo)=>s+mo[ri][2],0)*100)/100;
      const pct = Math.round(act/capN*100);
      const col = pct>=80?'#10b981':pct>=50?'#3b82f6':pct>=30?'#f59e0b':'#ef4444';
      const status = pct>=80?'ดีมาก':pct>=50?'ดี':pct>=30?'ปานกลาง':'ต่ำ';
      const pillC = pct>=80?'p-g':pct>=50?'p-g':pct>=30?'p-a':'p-r';
      return `<tr>
        <td style="font-weight:500">${label}</td><td>${capN.toLocaleString()}</td>
        <td><strong>${act.toLocaleString()}</strong></td>
        <td><div class="bw"><div class="bt"><div class="bf" style="width:${Math.min(pct,100)}%;background:${col}"></div></div>
          <span style="min-width:36px;color:${col};font-weight:600;font-size:11px">${pct}%</span></div></td>
        <td><span class="pill ${pillC}">${status}</span></td>
      </tr>`;
    }).join('');
  }

  // insights ภาพรวม
  const insAll = document.getElementById('ins-all');
  if (insAll && !insAll.innerHTML) {
    const totalAll = Math.round(TOTAL_ACT.reduce((a,b)=>a+b,0)*100)/100;
    const avgUtil = (totalAll/(TOTAL_CAP*NM)*100).toFixed(1);
    const bestMonthIdx = TOTAL_ACT.indexOf(Math.max(...TOTAL_ACT));
    const worstMonthIdx = TOTAL_ACT.indexOf(Math.min(...TOTAL_ACT));
    const bestPlantIdx = cumPlant.indexOf(Math.max(...cumPlant));
    const bestProdIdx = cumProdPcts.indexOf(Math.max(...cumProdPcts));
    const worstProdIdx = cumProdPcts.indexOf(Math.min(...cumProdPcts));
    const items = [
      {c:'#3b82f6',icon:'📊',title:`ภาพรวม ${NM} เดือน — ${totalAll.toLocaleString()} คิว`,body:`Utilization เฉลี่ย ${avgUtil}% จากกำลังผลิตรวม ${(TOTAL_CAP*NM).toLocaleString()} คิว มีกำลังเหลืออีก ${((TOTAL_CAP*NM)-totalAll).toLocaleString()} คิว (หมายเหตุ: ก.ค. มีข้อมูลถึงวันที่ 16)`},
      {c:'#10b981',icon:'🏆',title:`${MONTHS[bestMonthIdx]} — เดือนที่ผลิตสูงสุด`,body:`${TOTAL_ACT[bestMonthIdx].toLocaleString()} คิว คิดเป็น ${(TOTAL_ACT[bestMonthIdx]/TOTAL_CAP*100).toFixed(1)}% Utilization สูงสุดในรอบ ${NM} เดือน`},
      {c:'#ef4444',icon:'📉',title:`${MONTHS[worstMonthIdx]} — เดือนที่ผลิตต่ำสุด`,body:`${TOTAL_ACT[worstMonthIdx].toLocaleString()} คิว ต่างจากเดือนสูงสุด ${(Math.round((TOTAL_ACT[bestMonthIdx]-TOTAL_ACT[worstMonthIdx])*100)/100).toLocaleString()} คิว${worstMonthIdx===NM-1?' (ก.ค. ยังไม่ครบเดือน — ข้อมูลถึงวันที่ 16)':''}`},
      {c:'#f59e0b',icon:'🏭',title:`${plantNames[bestPlantIdx]} — โรงงานผลิตสูงสุด`,body:`รวม ${cumPlant[bestPlantIdx].toLocaleString()} คิว คิดเป็น ${plantUtil6[bestPlantIdx]}% Utilization เฉลี่ย`},
      {c:'#8b5cf6',icon:'⚡',title:`${PRODS[bestProdIdx]} — สินค้า Util สูงสุด`,body:`Utilization เฉลี่ย ${cumProdPcts[bestProdIdx]}% ผลิตรวม ${cumProd[bestProdIdx].toLocaleString()} คิว จากกำลัง ${(CAP_PROD[bestProdIdx]*NM).toLocaleString()} คิว`},
      {c:'#14b8a6',icon:'💡',title:`${PRODS[worstProdIdx]} — โอกาสเพิ่มกำลังผลิต`,body:`Utilization เฉลี่ยเพียง ${cumProdPcts[worstProdIdx]}% ยังมีกำลังเหลืออีก ${(CAP_PROD[worstProdIdx]*NM-cumProd[worstProdIdx]).toLocaleString()} คิว ควรพิจารณาเพิ่มคำสั่งซื้อ`},
    ];
    insAll.innerHTML = items.map(ins=>`
      <div class="ins-card" style="--c:${ins.c}">
        <div class="ins-icon">${ins.icon}</div>
        <div class="ins-title">${ins.title}</div>
        <div class="ins-body">${ins.body}</div>
      </div>`).join('');
  }
}

// ===== TAB SWITCH =====
function switchTab(target, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const page = document.getElementById(target==='all' ? 'page-all' : `page-${target}`);
  if (page) page.classList.add('active');
  if (target==='all') renderAll(); else renderMonth(target);
}

// ===== INITIAL RENDER =====
renderAll();
</script>
</body>
</html>
